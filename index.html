<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XR Tech Demo</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f3f3f3;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
      background: #f3f3f3;
    }
  </style>
</head>
<body>
  <model-viewer
    src="model.glb"
    ios-src="model.usdz"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    tone-mapping="neutral"
    shadow-intensity="1"
    shadow-softness="1"
    environment-image="whipple_creek_regional_park_04_1k.hdr"
    alt="3D модель человека">
  </model-viewer>
</body>
</html>
